{% extends 'base.html' %}
{% block content %}
<div class="panel">
  <h1>Alle Kurse</h1>
  <div class="course-grid">
    {% for course in courses %}
      <article class="course-card">
        <h3>{{ course.title }}</h3>
        <p>{{ course.summary }}</p>
        <a class="button button-secondary" href="{{ url_for('course_detail', course_id=course.id) }}">Details</a>
      </article>
    {% endfor %}
  </div>
</div>
{% endblock %}
