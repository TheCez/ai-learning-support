{% extends 'base.html' %}
{% block content %}
<div class="panel">
  <h1>Sprachtest</h1>
  <form method="post">
    {% for question in questions %}
      <div class="question-block">
        <p><strong>{{ loop.index }}. {{ question.question }}</strong></p>
        {% for option in question.choices %}
          <label class="option-label">
            <input type="radio" name="question_{{ loop.index0 }}" value="{{ option }}" required>
            {{ option }}
          </label>
        {% endfor %}
      </div>
    {% endfor %}
    <button class="button" type="submit">Auswerten</button>
  </form>
</div>
{% endblock %}
