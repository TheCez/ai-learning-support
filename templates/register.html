{% extends 'base.html' %}
{% block content %}
<div class="panel">
  <h1>Registrierung</h1>
  <form action="" method="post">
    <label>Rolle</label>
    <select name="role" required>
      <option value="student">Student:in</option>
      <option value="teacher">Lehrende:r</option>
    </select>
    <label>Vorname</label>
    <input type="text" name="first_name" required>
    <label>Nachname</label>
    <input type="text" name="last_name" required>
    <label>E-Mail</label>
    <input type="email" name="email" required>
    <label>Passwort</label>
    <input type="password" name="password" required>
    <label>Herkunftsland</label>
    <select name="country">
      <option value="">— bitte wählen —</option>
      <option>Deutschland</option>
      <option>Österreich</option>
      <option>Schweiz</option>
      <option>Polen</option>
      <option>Rumänien</option>
      <option>Bulgarien</option>
      <option>Kroatien</option>
      <option>Ungarn</option>
      <option>Tschechien</option>
      <option>Türkei</option>
      <option>Syrien</option>
      <option>Ukraine</option>
      <option>Bosnien und Herzegowina</option>
      <option>Kosovo</option>
      <option>Serbien</option>
      <option>Italien</option>
      <option>Spanien</option>
      <option>Portugal</option>
      <option>Philippinen</option>
      <option>Vietnam</option>
      <option>Indien</option>
      <option>Marokko</option>
      <option>Tunesien</option>
      <option>Brasilien</option>
      <option>Mexiko</option>
      <option>Sonstiges</option>
    </select>
    <label>Muttersprache</label>
    <select name="language">
      <option value="">— bitte wählen —</option>
      <option>Deutsch</option>
      <option>Englisch</option>
      <option>Polnisch</option>
      <option>Rumänisch</option>
      <option>Bulgarisch</option>
      <option>Kroatisch</option>
      <option>Ungarisch</option>
      <option>Tschechisch</option>
      <option>Türkisch</option>
      <option>Arabisch</option>
      <option>Ukrainisch</option>
      <option>Russisch</option>
      <option>Bosnisch</option>
      <option>Serbisch</option>
      <option>Albanisch</option>
      <option>Italienisch</option>
      <option>Spanisch</option>
      <option>Portugiesisch</option>
      <option>Filipino / Tagalog</option>
      <option>Vietnamesisch</option>
      <option>Hindi</option>
      <option>Französisch</option>
      <option>Sonstige</option>
    </select>
    <label>Fachrichtung</label>
    <select name="speciality">
      <option value="">— bitte wählen —</option>
      <option>Allgemeine Pflege</option>
      <option>Altenpflege</option>
      <option>Krankenpflege</option>
      <option>Kinderkrankenpflege</option>
      <option>Intensivpflege</option>
      <option>Anästhesiepflege</option>
      <option>Notfallpflege</option>
      <option>OP-Pflege</option>
      <option>Psychiatrische Pflege</option>
      <option>Palliativpflege</option>
      <option>Geriatrie</option>
      <option>Onkologische Pflege</option>
      <option>Hebamme / Entbindungspflege</option>
      <option>Rehabilitation</option>
      <option>Ambulante Pflege</option>
      <option>Pflegepädagogik</option>
      <option>Pflegemanagement</option>
      <option>Sonstiges</option>
    </select>
    <button class="button" type="submit">Registrieren</button>
  </form>
</div>
{% endblock %}
