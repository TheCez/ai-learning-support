{% extends 'base.html' %}
{% block content %}
<div class="panel">
  <h1>Neuen Kurs erstellen</h1>
  <form method="post">
    <label>Kursname</label>
    <input type="text" name="title" required>
    <label>Zusammenfassung</label>
    <textarea name="summary" rows="3" required></textarea>
    <label>Empfohlenes Niveau</label>
    <select name="recommended_level">
      <option value="A1">A1</option>
      <option value="A2">A2</option>
      <option value="B1">B1</option>
      <option value="B2">B2</option>
      <option value="C1">C1</option>
    </select>
    <h2>Erstes Modul</h2>
    <label>Modultitel</label>
    <input type="text" name="module_title" required>
    <label>Modulbeschreibung</label>
    <textarea name="module_description" rows="3" required></textarea>
    <label>Modultyp</label>
    <select name="module_type">
      <option value="quiz">Quiz</option>
      <option value="reading">Text</option>
      <option value="audio">Audio</option>
    </select>
    <label>Inhalt</label>
    <textarea name="content_body" rows="5"></textarea>
    <button class="button" type="submit">Kurs speichern</button>
  </form>
</div>
{% endblock %}
